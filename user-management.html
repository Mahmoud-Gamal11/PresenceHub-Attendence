<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresenceHub - User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="user-management.css">
</head>

<body>
    <div id="notification" class="notification"></div>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">PresenceHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="reports.html">Reports</a></li>
                    <li class="nav-item"><a class="nav-link active" href="user-management.html">User Management</a></li>
                    <li class="nav-item"><a class="nav-link " href="complaints.html">Complaints</a></li>
                    <li class="nav-item"><a class="nav-link " href="integrations.html">Integrations</a></li>
                    <li class="nav-item"><a class="nav-link" href="vacations.html">Vacations</a></li>
                    <li class="nav-item"><a class="nav-link " href="subscription.html">Subscription</a></li>
                    <li class="nav-item"><a class="nav-link" href="settings.html">Account</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="login.html" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container py-5 mt-5">
        <section id="user-management">
            <h2 class="display-6 fw-bold mb-4">User Management</h2>
            <div id="admin-section" class="card shadow-sm mb-4 d-none">
                <div class="card-body">
                    <h3 class="h5 fw-bold mb-3">Manage Users</h3>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Company</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="user-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div id="edit-user-modal" class="modal fade" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Edit User</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="edit-user-form" class="d-flex flex-column gap-3">
                                <input type="hidden" id="edit-user-id">
                                <input type="email" id="edit-email" class="form-control" placeholder="Email" required>
                                <select id="edit-role" class="form-select" required>
                                    <option value="employee">Employee</option>
                                    <option value="admin">Admin</option>
                                    <option value="super_admin">Super Admin</option>
                                </select>
                                <input type="text" id="edit-company" class="form-control" placeholder="Company Name"
                                    required>
                                <button type="submit" class="btn btn-primary position-relative">
                                    Save Changes
                                    <div id="edit-user-spinner" class="spinner"></div>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="bg-dark text-white text-center py-4">
        &copy; 2025 PresenceHub | <a href="privacy.html" class="text-gold">Privacy Policy</a> |
        <a href="terms.html" class="text-gold">Terms of Service</a>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="user-management.js"></script>
</body>

</html>
