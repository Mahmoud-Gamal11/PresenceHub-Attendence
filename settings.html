<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresenceHub - Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="settings.css">
</head>

<body>
    <div id="notification" class="notification"></div>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">PresenceHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="reports.html">Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="user-management.html">User Management</a></li>
                    <li class="nav-item"><a class="nav-link " href="complaints.html">Complaints</a></li>
                    <li class="nav-item"><a class="nav-link " href="integrations.html">Integrations</a></li>
                    <li class="nav-item"><a class="nav-link" href="vacations.html">Vacations</a></li>
                    <li class="nav-item"><a class="nav-link active" href="settings.html">Account</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="login.html" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container py-5 mt-5">
        <section id="account">
            <h2 class="display-6 fw-bold mb-4">Account Settings</h2>
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h3 class="h5 fw-bold mb-3">Profile Picture</h3>
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <img id="profile-picture-preview" src="https://via.placeholder.com/100" alt="Profile Picture"
                            class="rounded-circle" style="width: 100px; height: 100px; object-fit: cover;">
                        <div>
                            <input type="file" id="profile-picture" class="form-control" accept="image/*">
                            <button id="upload-picture-btn" class="btn btn-primary mt-2 position-relative">
                                Upload Picture
                                <div id="picture-spinner" class="spinner"></div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h3 class="h5 fw-bold mb-3">Profile Information</h3>
                    <form id="profile-form" class="d-flex flex-column gap-3">
                        <input type="email" id="profile-email" class="form-control form-control-lg" placeholder="Email"
                            required>
                        <input type="text" id="profile-role" class="form-control form-control-lg" placeholder="Role"
                            disabled>
                        <input type="text" id="profile-company" class="form-control form-control-lg"
                            placeholder="Company Name" required>
                        <button id="update" type="submit" class="btn btn-primary btn-lg position-relative">
                            Update Profile
                            <div id="profile-spinner" class="spinner"></div>
                        </button>
                    </form>
                </div>
            </div>
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="h5 fw-bold mb-3">Change Password</h3>
                    <form id="password-form" class="d-flex flex-column gap-3">
                        <input type="password" id="current-password" class="form-control form-control-lg"
                            placeholder="Current Password" required>
                        <input type="password" id="new-password" class="form-control form-control-lg"
                            placeholder="New Password" required>
                        <input type="password" id="confirm-password" class="form-control form-control-lg"
                            placeholder="Confirm New Password" required>
                        <button id="change" type="submit" class="btn btn-primary btn-lg position-relative">
                            Change Password
                            <div id="password-spinner" class="spinner"></div>
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer class="bg-dark text-white text-center py-4">
        &copy; 2025 PresenceHub | <a href="privacy.html" class="text-gold">Privacy Policy</a> |
        <a href="terms.html" class="text-gold">Terms of Service</a>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="settings.js"></script>
</body>

</html>
